services:
  db:
    image: postgres:15
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MQTT_BROKER: mqtt
      ENABLE_PYTHON_SIM: ${ENABLE_PYTHON_SIM:-true}
    ports:
      - "8000:8000"
    depends_on:
      - db
      - mqtt
    volumes:
      - ./backend/app:/app/app

  mqtt_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MQTT_BROKER: mqtt
    command: ["python", "app/mqtt_worker.py"]
    depends_on:
      - db
      - mqtt
    volumes:
      - ./backend/app:/app/app

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  postgres_data:
